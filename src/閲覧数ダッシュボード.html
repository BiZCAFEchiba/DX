<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>閲覧数ダッシュボード | BizCAFE</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background: #f5f7fa;
      color: #333;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a3a5c, #2a5f8f);
      color: white;
      padding: 18px 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: 0.05em; }
    header p  { font-size: 0.8rem; opacity: 0.8; margin-top: 4px; }

    .container { max-width: 860px; margin: 20px auto; padding: 0 14px 40px; }

    /* ツールバー */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }
    .toolbar-info { font-size: 0.82rem; color: #666; }
    .toolbar-info span { font-weight: 700; color: #1a3a5c; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: #1a3a5c; color: white; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-danger  { background: #c0392b; color: white; }
    .btn-danger:hover  { opacity: 0.85; }

    /* タブナビゲーション */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
      background: #e0e5eb;
      padding: 4px;
      border-radius: 10px;
    }
    .tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      background: none;
      font-size: 0.85rem;
      font-weight: 700;
      color: #666;
      cursor: pointer;
      border-radius: 7px;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: white;
      color: #1a3a5c;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .tab-content { display: none; margin-top: 10px; }
    .tab-content.active { display: block; animation: fadeIn 0.3s; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 累計カード */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 16px 14px 14px;
      text-align: center;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
      border-top: 4px solid #2a5f8f;
    }
    .card-label { font-size: 0.75rem; color: #888; margin-bottom: 8px; font-weight: 600; letter-spacing: 0.03em; }
    .card-count { font-size: 2rem; font-weight: 800; color: #1a3a5c; line-height: 1; }
    .card-unit  { font-size: 0.72rem; color: #aaa; margin-top: 4px; }

    /* KPIカード */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .kpi-card {
      background: white;
      padding: 18px 12px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    }
    .kpi-label { font-size: 0.72rem; color: #888; margin-bottom: 6px; font-weight: 700; }
    .kpi-value { font-size: 1.4rem; font-weight: 800; color: #1a3a5c; }
    .kpi-target { font-size: 0.75rem; color: #999; margin-top: 4px; }
    .achievement-bar {
      height: 6px; background: #eee; border-radius: 3px; margin-top: 10px; overflow: hidden;
    }
    .achievement-fill { height: 100%; background: #27ae60; width: 0%; transition: width 0.5s; }

    /* チャートセクション */
    .section-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: #1a3a5c;
      margin-bottom: 12px;
      padding-left: 8px;
      border-left: 3px solid #2a5f8f;
    }

    .chart-box {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
      margin-bottom: 24px;
      overflow: hidden;
    }
    .chart-box canvas { display: block; width: 100%; }

    /* 分析セクション */
    .analysis-score {
      font-size: 2.2rem; font-weight: 800; color: #27ae60; text-align: center; margin: 10px 0;
    }
    .analysis-desc { font-size: 0.85rem; color: #666; line-height: 1.6; padding: 0 10px; }

    /* 日別テーブル */
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
      min-width: 460px;
    }
    th {
      background: #1a3a5c;
      color: white;
      padding: 9px 12px;
      text-align: center;
      font-weight: 600;
      white-space: nowrap;
    }
    td {
      padding: 8px 12px;
      text-align: center;
      border-bottom: 1px solid #eee;
      white-space: nowrap;
    }
    tr:nth-child(even) td { background: #f9fbfd; }
    tr:hover td { background: #eaf2fb; }
    .td-date { text-align: left; font-weight: 600; color: #1a3a5c; }

    /* ステータス */
    #status { font-size: 0.8rem; color: #888; text-align: right; margin-top: 6px; }

    /* ローディング */
    .loading { text-align: center; padding: 40px; color: #aaa; font-size: 0.9rem; }

    /* リセット確認モーダル */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .overlay.open { display: flex; }
    .modal {
      background: white;
      border-radius: 14px;
      padding: 28px 24px 20px;
      max-width: 320px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .modal h2 { font-size: 1rem; font-weight: 700; margin-bottom: 10px; }
    .modal p  { font-size: 0.85rem; color: #666; margin-bottom: 20px; line-height: 1.6; }
    .modal-btns { display: flex; gap: 10px; justify-content: center; }
    .btn-cancel { background: #eee; color: #555; }
    .btn-cancel:hover { background: #ddd; }

    @media (max-width: 480px) {
      .cards { grid-template-columns: repeat(2, 1fr); }
      .kpi-grid { grid-template-columns: 1fr; }
      .card-count { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>📊 閲覧数ダッシュボード</h1>
  <p>BizCAFE コーナーアクセス & KPI分析</p>
</header>

<div class="container">

  <!-- タブ切替 -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('views')">閲覧数</button>
    <button class="tab-btn"        onclick="switchTab('kpi')">KPI評価</button>
    <button class="tab-btn"        onclick="switchTab('analysis')">分析</button>
  </div>

  <!-- タブ1: 閲覧数 -->
  <div id="tab-views" class="tab-content active">
    <div class="toolbar">
      <div class="toolbar-info">
        リセット日時: <span id="lastReset">—</span>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="loadData()">🔄 更新</button>
        <button class="btn btn-danger"  onclick="openResetModal()">🗑 リセット</button>
      </div>
    </div>

    <div class="section-title">累計閲覧数</div>
    <div class="cards" id="cards">
      <div class="loading">読み込み中...</div>
    </div>

    <div class="section-title">ページ別 累計（棒グラフ）</div>
    <div class="chart-box">
      <canvas id="barChart" height="220"></canvas>
    </div>

    <div class="section-title">直近7日間の推移（折れ線グラフ）</div>
    <div class="chart-box">
      <canvas id="lineChart" height="220"></canvas>
    </div>

    <div class="section-title">日別詳細</div>
    <div class="chart-box">
      <div class="table-wrap">
        <table>
          <thead>
            <tr id="tableHead"></tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="10" class="loading">読み込み中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- タブ2: KPI評価 -->
  <div id="tab-kpi" class="tab-content">
    <div class="section-title">今月のKPI進捗</div>
    <div class="kpi-grid" id="kpiCards">
      <div class="loading">読み込み中...</div>
    </div>

    <div class="section-title">KPI項目別 達成状況</div>
    <div class="chart-box">
      <canvas id="kpiBarChart" height="200"></canvas>
    </div>

    <div class="section-title">主要指標の推移（直近7日間）</div>
    <div class="chart-box">
      <canvas id="kpiLineChart" height="220"></canvas>
    </div>
  </div>

  <!-- タブ3: 分析 -->
  <div id="tab-analysis" class="tab-content">
    <div class="section-title">閲覧効率分析</div>
    <div class="chart-box" style="text-align:center;">
      <div class="card-label">サイト集客効率 (CVR目安)</div>
      <div class="analysis-score" id="efficiencyScore">—%</div>
      <p class="analysis-desc" id="efficiencyDesc">閲覧数に対するKPI成果（DU/Meetup/MCS）の総和比率です。</p>
    </div>

    <div class="section-title">PVと成果の相関</div>
    <div class="chart-box">
      <canvas id="correlChart" height="220"></canvas>
    </div>

    <div class="chart-box">
      <div class="section-title" style="border:none;margin-bottom:8px;">💡 分析コメント</div>
      <div class="analysis-desc" id="analysisComment">データを読み込み中です...</div>
    </div>
  </div>

  <div id="status"></div>
</div>

<!-- リセット確認モーダル -->
<div class="overlay" id="overlay" onclick="closeResetModal(event)">
  <div class="modal">
    <h2>⚠️ リセット確認</h2>
    <p>累計閲覧数をすべて<br>ゼロにリセットします。<br>この操作は元に戻せません。</p>
    <div class="modal-btns">
      <button class="btn btn-cancel" onclick="closeResetModal()">キャンセル</button>
      <button class="btn btn-danger"  onclick="doReset()">リセット実行</button>
    </div>
  </div>
</div>

<script>
  var APP_URL = '<?= appUrl ?>';
  var PAGE_LABELS = {
    congestion: '混雑状況',
    calendar:   '営業カレンダー',
    qa:         'Q&A',
    notices:    'お知らせ',
    free_board: '自由掲示板',
    recruit:    '採用情報'
  };
  var COLORS = ['#2a5f8f', '#27ae60', '#e67e22', '#8e44ad', '#c0392b', '#16a085'];
  var pageKeys = Object.keys(PAGE_LABELS);
  var currentData = null;
  var kpiData = null;
  var kpiDaily = null;

  // ---------- タブ切替 ----------
  function switchTab(tabId) {
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
    document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
    
    var btn = document.querySelector('button[onclick="switchTab(\'' + tabId + '\')"]');
    if (btn) btn.classList.add('active');
    document.getElementById('tab-' + tabId).classList.add('active');

    if (currentData) {
      if (tabId === 'views') {
        renderBarChart(currentData.counts);
        renderLineChart(currentData.dailyCounts);
      } else if (tabId === 'kpi' && kpiData) {
        renderKpiCards(kpiData);
        renderKpiBarChart(kpiData);
        if (kpiDaily) renderKpiLineChart(kpiDaily);
      } else if (tabId === 'analysis' && kpiData && currentData) {
        renderAnalysis(currentData, kpiData, kpiDaily);
      }
    }
  }

  // ---------- データ取得 ----------
  function loadData() {
    setStatus('更新中...');
    
    var p1 = fetch(APP_URL + '?page=calendar&action=pageViewGet').then(function(r){return r.json();});
    var p2 = fetch(APP_URL + '?page=calendar&action=storeProgress').then(function(r){return r.json();});
    var p3 = fetch(APP_URL + '?page=calendar&action=kpiDailyGet').then(function(r){return r.json();});

    Promise.all([p1, p2, p3])
      .then(function(results) {
        currentData = results[0];
        kpiData = results[1];
        kpiDaily = results[2];

        // 各タブのレンダリング
        renderCards(currentData.counts);
        renderBarChart(currentData.counts);
        renderLineChart(currentData.dailyCounts);
        renderTable(currentData.dailyCounts);
        
        renderKpiCards(kpiData);
        renderKpiBarChart(kpiData);
        renderKpiLineChart(kpiDaily);

        renderAnalysis(currentData, kpiData, kpiDaily);

        document.getElementById('lastReset').textContent =
          currentData.lastResetAt ? formatDateTimeJP(currentData.lastResetAt) : '未リセット';
        setStatus('最終更新: ' + formatDateTimeJP(new Date().toISOString()));
      })
      .catch(function(e) { setStatus('取得エラー: ' + e.message); console.error(e); });
  }

  // ---------- 閲覧数: 各関数 ----------
  function renderCards(counts) {
    if(!counts) return;
    var total = pageKeys.reduce(function(s, k) { return s + (counts[k] || 0); }, 0);
    var html = pageKeys.map(function(k, i) {
      return '<div class="card" style="border-top-color:' + COLORS[i] + '">'
        + '<div class="card-label">' + PAGE_LABELS[k] + '</div>'
        + '<div class="card-count">' + (counts[k] || 0) + '</div>'
        + '<div class="card-unit">PV</div>'
        + '</div>';
    }).join('');
    html += '<div class="card" style="border-top-color:#34495e">'
      + '<div class="card-label">合計</div>'
      + '<div class="card-count" style="color:#34495e">' + total + '</div>'
      + '<div class="card-unit">PV</div>'
      + '</div>';
    document.getElementById('cards').innerHTML = html;
  }

  function renderBarChart(counts) {
    var canvas = document.getElementById('barChart');
    if (!canvas || canvas.offsetParent === null) return;
    canvas.width = canvas.offsetWidth;
    var ctx = canvas.getContext('2d'), W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);

    var values = pageKeys.map(function(k) { return counts[k] || 0; });
    var maxVal = Math.max.apply(null, values) || 1;
    var padL = 36, padR = 12, padT = 16, padB = 50;
    var plotW = W - padL - padR, plotH = H - padT - padB;
    var barW = Math.floor(plotW / pageKeys.length * 0.55), gap = Math.floor(plotW / pageKeys.length);

    drawGrid(ctx, padL, padR, padT, padB, W, H, maxVal);

    values.forEach(function(v, i) {
      var x = padL + gap * i + (gap - barW) / 2;
      var bh = plotH * (v / maxVal);
      var y = padT + plotH - bh;
      ctx.fillStyle = COLORS[i];
      roundRect(ctx, x, y, barW, bh, 5);
      ctx.fill();
      if (v > 0) {
        ctx.fillStyle = '#333'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText(v, x + barW / 2, y - 5);
      }
      ctx.fillStyle = '#555'; ctx.font = '9px sans-serif'; 
      var label = PAGE_LABELS[pageKeys[i]];
      ctx.fillText(label.length > 5 ? label.slice(0, 5) : label, x + barW / 2, padT + plotH + 16);
    });
  }

  function renderLineChart(dailyCounts) {
    var canvas = document.getElementById('lineChart');
    if (!canvas || canvas.offsetParent === null) return;
    canvas.width = canvas.offsetWidth;
    var ctx = canvas.getContext('2d'), W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);

    var days = getRecentDays(7);
    var padL = 36, padR = 12, padT = 16, padB = 36;
    var plotW = W - padL - padR, plotH = H - padT - padB;
    var maxVal = 1;
    pageKeys.forEach(function(k) {
      days.forEach(function(day) {
        var v = (dailyCounts[k] && dailyCounts[k][day]) ? dailyCounts[k][day] : 0;
        if (v > maxVal) maxVal = v;
      });
    });

    drawGrid(ctx, padL, padR, padT, padB, W, H, maxVal);

    pageKeys.forEach(function(k, i) {
      var pts = days.map(function(day, di) {
        var v = (dailyCounts[k] && dailyCounts[k][day]) ? dailyCounts[k][day] : 0;
        return { x: padL + plotW * di / (days.length - 1), y: padT + plotH - (plotH * v / maxVal), v: v };
      });
      ctx.beginPath(); ctx.strokeStyle = COLORS[i]; ctx.lineWidth = 2;
      pts.forEach(function(p, pi) { pi === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y); });
      ctx.stroke();
    });
    
    ctx.fillStyle = '#888'; ctx.font = '9px sans-serif'; ctx.textAlign = 'center';
    days.forEach(function(day, di) {
      var x = padL + plotW * di / (days.length - 1);
      ctx.fillText(day.slice(5).replace('-','/'), x, padT + plotH + 16);
    });
  }

  // ---------- KPI評価 タブ ----------
  function renderKpiCards(data) {
    if(!data) return;
    var keys = ['DU', 'Meetup', 'MCS'];
    var labels = { DU: 'DU (来店)', Meetup: 'Meetup (オンライン)', MCS: 'MCS (閲覧)' };
    var html = keys.map(function(k) {
      var actual = data[k].actual || 0;
      var target = data[k].target || 1;
      var rate = Math.min(100, Math.round(actual / target * 100));
      return '<div class="kpi-card">'
        + '<div class="kpi-label">' + labels[k] + '</div>'
        + '<div class="kpi-value">' + actual + '</div>'
        + '<div class="kpi-target">目標: ' + target + '</div>'
        + '<div class="achievement-bar"><div class="achievement-fill" style="width:' + rate + '%"></div></div>'
        + '<div class="card-unit" style="margin-top:6px; font-weight:700; color:' + (rate >= 100 ? '#27ae60':'#e67e22') + '">' + rate + '%</div>'
        + '</div>';
    }).join('');
    document.getElementById('kpiCards').innerHTML = html;
  }

  function renderKpiBarChart(data) {
    var canvas = document.getElementById('kpiBarChart');
    if (!canvas || canvas.offsetParent === null) return;
    canvas.width = canvas.offsetWidth;
    var ctx = canvas.getContext('2d'), W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);

    var keys = ['DU', 'Meetup', 'MCS'];
    var maxVal = 0;
    keys.forEach(function(k) { maxVal = Math.max(maxVal, data[k].actual, data[k].target); });
    maxVal = maxVal || 100;

    var padL = 40, padR = 20, padT = 20, padB = 40;
    var plotW = W - padL - padR, plotH = H - padT - padB;
    var groupW = plotW / 3, barW = groupW * 0.3;

    drawGrid(ctx, padL, padR, padT, padB, W, H, maxVal);

    keys.forEach(function(k, i) {
      var baseX = padL + groupW * i + groupW/2;
      var th = plotH * (data[k].target / maxVal);
      ctx.fillStyle = '#eee';
      roundRect(ctx, baseX - barW - 2, padT + plotH - th, barW, th, 4);
      ctx.fill();
      var ah = plotH * (data[k].actual / maxVal);
      ctx.fillStyle = COLORS[i];
      roundRect(ctx, baseX + 2, padT + plotH - ah, barW, ah, 4);
      ctx.fill();
      ctx.fillStyle = '#666'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(k, baseX, padT + plotH + 18);
    });
  }

  function renderKpiLineChart(daily) {
    var canvas = document.getElementById('kpiLineChart');
    if (!canvas || canvas.offsetParent === null || !daily) return;
    canvas.width = canvas.offsetWidth;
    var ctx = canvas.getContext('2d'), W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);

    var days = getRecentDays(7);
    var keys = ['DU', 'Meetup', 'MCS'];
    var maxVal = 1;
    keys.forEach(function(k) { days.forEach(function(d) { if(daily[k] && daily[k][d] > maxVal) maxVal = daily[k][d]; }); });

    var padL = 36, padR = 12, padT = 16, padB = 36;
    var plotW = W - padL - padR, plotH = H - padT - padB;
    drawGrid(ctx, padL, padR, padT, padB, W, H, maxVal);
    keys.forEach(function(k, i) {
      ctx.beginPath(); ctx.strokeStyle = COLORS[i]; ctx.lineWidth = 2;
      days.forEach(function(d, di) {
        var v = (daily[k] && daily[k][d]) ? daily[k][d] : 0;
        var px = padL + plotW * di / (days.length - 1);
        var py = padT + plotH - (plotH * v / maxVal);
        di === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      });
      ctx.stroke();
    });
  }

  // ---------- 分析 タブ ----------
  function renderAnalysis(views, kpi, daily) {
    if(!views || !kpi) return;
    var totalViews = pageKeys.reduce(function(s, k) { return s + (views.counts[k] || 0); }, 0);
    var totalKpi = (kpi.DU.actual || 0) + (kpi.Meetup.actual || 0) + (kpi.MCS.actual || 0);
    var efficiency = totalViews > 0 ? (totalKpi / totalViews * 100).toFixed(1) : 0;
    document.getElementById('efficiencyScore').textContent = efficiency + '%';
    var comment = '';
    if (efficiency > 5) comment = '成果への転換率が非常に高い状態です。現在のコンテンツ展開を継続しましょう。';
    else if (efficiency > 2) comment = '安定した成果が出ています。さらなる改善のため特定ページのPV増加を狙いましょう。';
    else comment = '閲覧数に対して成果がやや少なめです。導線設計やコンテンツの訴求力を見直す余地があります。';
    document.getElementById('analysisComment').textContent = comment;
    if(daily) renderCorrelChart(views.dailyCounts, daily);
  }

  function renderCorrelChart(dailyViews, dailyKpi) {
    var canvas = document.getElementById('correlChart');
    if (!canvas || canvas.offsetParent === null) return;
    canvas.width = canvas.offsetWidth;
    var ctx = canvas.getContext('2d'), W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);
    var days = getRecentDays(7);
    var viewData = days.map(function(d) { return pageKeys.reduce(function(s, k) { return s + (dailyViews[k] ? dailyViews[k][d]||0 : 0); }, 0); });
    var kpiData = days.map(function(d) { return ((dailyKpi.DU && dailyKpi.DU[d])||0) + ((dailyKpi.Meetup && dailyKpi.Meetup[d])||0) + ((dailyKpi.MCS && dailyKpi.MCS[d])||0); });
    var maxV = Math.max.apply(null, viewData) || 1, maxK = Math.max.apply(null, kpiData) || 1;
    var padL = 40, padR = 40, padT = 20, padB = 30;
    var plotW = W - padL - padR, plotH = H - padT - padB;

    viewData.forEach(function(v, i) {
      var bw = plotW / days.length * 0.6;
      var bx = padL + (plotW / days.length) * i + (plotW / days.length - bw)/2;
      var bh = plotH * (v / maxV);
      ctx.fillStyle = 'rgba(42,95,143,0.15)';
      roundRect(ctx, bx, padT + plotH - bh, bw, bh, 3);
      ctx.fill();
    });
    ctx.beginPath(); ctx.strokeStyle = '#27ae60'; ctx.lineWidth = 3;
    kpiData.forEach(function(k, i) {
      var px = padL + (plotW / (days.length - 1 || 1)) * i;
      var py = padT + plotH - (plotH * k / maxK);
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    });
    ctx.stroke();
    ctx.fillStyle = '#1a3a5c'; ctx.font = '9px sans-serif'; ctx.textAlign = 'left';
    ctx.fillText('■ 閲覧数 (左軸)', padL, padT - 8);
    ctx.fillStyle = '#27ae60'; ctx.textAlign = 'right';
    ctx.fillText('● KPI成果 (右軸) ■', W - padR, padT - 8);
  }

  // ---------- ユーティリティ ----------
  function getRecentDays(n) {
    var days = [];
    for (var i = n - 1; i >= 0; i--) {
      var d = new Date(); d.setDate(d.getDate() - i);
      days.push(formatDateKey(d));
    }
    return days;
  }
  function drawGrid(ctx, padL, padR, padT, padB, W, H, maxVal) {
    ctx.strokeStyle = '#f0f2f5'; ctx.lineWidth = 1;
    var steps = 4;
    for (var s = 0; s <= steps; s++) {
      var yy = padT + (H - padT - padB) - ((H - padT - padB) * s / steps);
      ctx.beginPath(); ctx.moveTo(padL, yy); ctx.lineTo(W - padR, yy); ctx.stroke();
      ctx.fillStyle = '#bbb'; ctx.font = '9px sans-serif'; ctx.textAlign = 'right';
      ctx.fillText(Math.round(maxVal * s / steps), padL - 5, yy + 3);
    }
  }
  function setStatus(msg) { document.getElementById('status').textContent = msg; }
  function formatDateKey(date) {
    var y = date.getFullYear();
    var m = ('0' + (date.getMonth() + 1)).slice(-2);
    var d = ('0' + date.getDate()).slice(-2);
    return y + '-' + m + '-' + d;
  }
  function formatDateTimeJP(iso) {
    try {
      var d = new Date(iso);
      return (d.getMonth() + 1) + '月' + d.getDate() + '日 ' + ('0' + d.getHours()).slice(-2) + ':' + ('0' + d.getMinutes()).slice(-2);
    } catch (e) { return iso; }
  }
  function roundRect(ctx, x, y, w, h, r) {
    if (h < 0) h = 0;
    ctx.beginPath(); ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r); ctx.lineTo(x + w, y + h);
    ctx.lineTo(x, y + h); ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y); ctx.closePath();
  }

  function renderTable(dailyCounts) {
    var daySet = {};
    pageKeys.forEach(function(k) { if (dailyCounts[k]) Object.keys(dailyCounts[k]).forEach(function(day) { daySet[day] = true; }); });
    var days = Object.keys(daySet).sort().reverse().slice(0, 30);
    var thead = document.getElementById('tableHead');
    thead.innerHTML = '<th class="td-date">日付</th>' + pageKeys.map(function(k) { return '<th>' + PAGE_LABELS[k] + '</th>'; }).join('') + '<th>合計</th>';
    var tbody = document.getElementById('tableBody');
    if (days.length === 0) { tbody.innerHTML = '<tr><td colspan="8">データなし</td></tr>'; return; }
    tbody.innerHTML = days.map(function(day) {
      var total = 0;
      var cells = pageKeys.map(function(k) {
        var v = (dailyCounts[k] && dailyCounts[k][day]) ? dailyCounts[k][day] : 0;
        total += v; return '<td>' + (v || '—') + '</td>';
      }).join('');
      return '<tr><td class="td-date">' + day.slice(5) + '</td>' + cells + '<td><strong>' + total + '</strong></td></tr>';
    }).join('');
  }

  function openResetModal() { document.getElementById('overlay').classList.add('open'); }
  function closeResetModal(e) { if (e && e.target !== document.getElementById('overlay')) return; document.getElementById('overlay').classList.remove('open'); }
  function doReset() {
    document.getElementById('overlay').classList.remove('open');
    setStatus('リセット中...');
    fetch(APP_URL + '?page=calendar&action=pageViewReset').then(function(r) { return r.json(); }).then(function() { loadData(); }).catch(function(e) { setStatus('リセットエラー: ' + e.message); });
  }

  // ---------- 初期化 ----------
  window.addEventListener('resize', function() {
    var activeBtn = document.querySelector('.tab-btn.active');
    if(activeBtn) {
      var activeTab = activeBtn.getAttribute('onclick').match(/'([^']+)'/)[1];
      switchTab(activeTab);
    }
  });

  // iframe埋め込み時はヘッダーを非表示にする
  if (window.self !== window.top) {
    document.querySelector('header').style.display = 'none';
    document.querySelector('.container').style.marginTop = '10px';
  }

  loadData();
</script>
</body>
