<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>閲覧数ダッシュボード | BizCAFE</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background: #f5f7fa;
      color: #333;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a3a5c, #2a5f8f);
      color: white;
      padding: 18px 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: 0.05em; }
    header p  { font-size: 0.8rem; opacity: 0.8; margin-top: 4px; }

    .container { max-width: 860px; margin: 20px auto; padding: 0 14px 40px; }

    /* ツールバー */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }
    .toolbar-info { font-size: 0.82rem; color: #666; }
    .toolbar-info span { font-weight: 700; color: #1a3a5c; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: #1a3a5c; color: white; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-danger  { background: #c0392b; color: white; }
    .btn-danger:hover  { opacity: 0.85; }

    /* カードグリッド */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 16px 14px 14px;
      text-align: center;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
      border-top: 4px solid #2a5f8f;
    }
    .card-label { font-size: 0.75rem; color: #888; margin-bottom: 8px; font-weight: 600; letter-spacing: 0.03em; }
    .card-count { font-size: 2rem; font-weight: 800; color: #1a3a5c; line-height: 1; }
    .card-unit  { font-size: 0.72rem; color: #aaa; margin-top: 4px; }

    /* チャートセクション */
    .section-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: #1a3a5c;
      margin-bottom: 12px;
      padding-left: 8px;
      border-left: 3px solid #2a5f8f;
    }

    .chart-box {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
      margin-bottom: 24px;
      overflow: hidden;
    }
    .chart-box canvas { display: block; width: 100%; }

    /* 日別テーブル */
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
      min-width: 460px;
    }
    th {
      background: #1a3a5c;
      color: white;
      padding: 9px 12px;
      text-align: center;
      font-weight: 600;
      white-space: nowrap;
    }
    td {
      padding: 8px 12px;
      text-align: center;
      border-bottom: 1px solid #eee;
      white-space: nowrap;
    }
    tr:nth-child(even) td { background: #f9fbfd; }
    tr:hover td { background: #eaf2fb; }
    .td-date { text-align: left; font-weight: 600; color: #1a3a5c; }

    /* ステータス */
    #status { font-size: 0.8rem; color: #888; text-align: right; margin-top: 6px; }

    /* ローディング */
    .loading { text-align: center; padding: 40px; color: #aaa; font-size: 0.9rem; }

    /* リセット確認モーダル */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .overlay.open { display: flex; }
    .modal {
      background: white;
      border-radius: 14px;
      padding: 28px 24px 20px;
      max-width: 320px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .modal h2 { font-size: 1rem; font-weight: 700; margin-bottom: 10px; }
    .modal p  { font-size: 0.85rem; color: #666; margin-bottom: 20px; line-height: 1.6; }
    .modal-btns { display: flex; gap: 10px; justify-content: center; }
    .btn-cancel { background: #eee; color: #555; }
    .btn-cancel:hover { background: #ddd; }

    @media (max-width: 480px) {
      .cards { grid-template-columns: repeat(2, 1fr); }
      .card-count { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>📊 閲覧数ダッシュボード</h1>
  <p>BizCAFE コーナー各ページのアクセス集計</p>
</header>

<div class="container">

  <div class="toolbar">
    <div class="toolbar-info">
      リセット日時: <span id="lastReset">—</span>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="loadData()">🔄 更新</button>
      <button class="btn btn-danger"  onclick="openResetModal()">🗑 リセット</button>
    </div>
  </div>

  <!-- 累計カード -->
  <div class="section-title">累計閲覧数</div>
  <div class="cards" id="cards">
    <div class="loading">読み込み中...</div>
  </div>

  <!-- 棒グラフ: ページ別累計 -->
  <div class="section-title">ページ別 累計（棒グラフ）</div>
  <div class="chart-box">
    <canvas id="barChart" height="220"></canvas>
  </div>

  <!-- 折れ線グラフ: 直近7日間の推移 -->
  <div class="section-title">直近7日間の推移（折れ線グラフ）</div>
  <div class="chart-box">
    <canvas id="lineChart" height="220"></canvas>
  </div>

  <!-- 日別テーブル -->
  <div class="section-title">日別詳細</div>
  <div class="chart-box">
    <div class="table-wrap">
      <table>
        <thead>
          <tr id="tableHead"></tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="10" class="loading">読み込み中...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div id="status"></div>
</div>

<!-- リセット確認モーダル -->
<div class="overlay" id="overlay" onclick="closeResetModal(event)">
  <div class="modal">
    <h2>⚠️ リセット確認</h2>
    <p>累計閲覧数をすべて<br>ゼロにリセットします。<br>この操作は元に戻せません。</p>
    <div class="modal-btns">
      <button class="btn btn-cancel" onclick="closeResetModal()">キャンセル</button>
      <button class="btn btn-danger"  onclick="doReset()">リセット実行</button>
    </div>
  </div>
</div>

<script>
  var APP_URL = '<?= appUrl ?>';

  // ページラベル定義
  var PAGE_LABELS = {
    congestion: '混雑状況',
    calendar:   '営業カレンダー',
    qa:         'Q&A',
    notices:    'お知らせ',
    free_board: '自由掲示板',
    recruit:    '採用情報'
  };

  // グラフ用カラーパレット
  var COLORS = [
    '#2a5f8f', '#27ae60', '#e67e22', '#8e44ad', '#c0392b', '#16a085'
  ];
  var COLORS_ALPHA = [
    'rgba(42,95,143,0.15)', 'rgba(39,174,96,0.12)', 'rgba(230,126,34,0.12)',
    'rgba(142,68,173,0.12)', 'rgba(192,57,43,0.12)', 'rgba(22,160,133,0.12)'
  ];

  var pageKeys = Object.keys(PAGE_LABELS);
  var currentData = null;

  // ---------- データ取得 ----------
  function loadData() {
    setStatus('更新中...');
    fetch(APP_URL + '?page=calendar&action=pageViewGet')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        currentData = data;
        renderCards(data.counts);
        renderBarChart(data.counts);
        renderLineChart(data.dailyCounts);
        renderTable(data.dailyCounts);
        document.getElementById('lastReset').textContent =
          data.lastResetAt ? formatDateTimeJP(data.lastResetAt) : '未リセット';
        setStatus('最終更新: ' + formatDateTimeJP(new Date().toISOString()));
      })
      .catch(function(e) { setStatus('取得エラー: ' + e.message); });
  }

  // ---------- カード描画 ----------
  function renderCards(counts) {
    var total = pageKeys.reduce(function(s, k) { return s + (counts[k] || 0); }, 0);
    var html = pageKeys.map(function(k, i) {
      return '<div class="card" style="border-top-color:' + COLORS[i] + '">'
        + '<div class="card-label">' + PAGE_LABELS[k] + '</div>'
        + '<div class="card-count">' + (counts[k] || 0) + '</div>'
        + '<div class="card-unit">PV</div>'
        + '</div>';
    }).join('');
    html += '<div class="card" style="border-top-color:#34495e">'
      + '<div class="card-label">合計</div>'
      + '<div class="card-count" style="color:#34495e">' + total + '</div>'
      + '<div class="card-unit">PV</div>'
      + '</div>';
    document.getElementById('cards').innerHTML = html;
  }

  // ---------- 棒グラフ ----------
  function renderBarChart(counts) {
    var canvas = document.getElementById('barChart');
    canvas.width = canvas.offsetWidth || 800;
    var ctx = canvas.getContext('2d');
    var W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);

    var values = pageKeys.map(function(k) { return counts[k] || 0; });
    var maxVal = Math.max.apply(null, values) || 1;
    var padL = 36, padR = 12, padT = 16, padB = 50;
    var plotW = W - padL - padR;
    var plotH = H - padT - padB;
    var barW = Math.floor(plotW / pageKeys.length * 0.55);
    var gap  = Math.floor(plotW / pageKeys.length);

    // 目盛り線
    ctx.strokeStyle = '#e8edf2';
    ctx.lineWidth = 1;
    var steps = 4;
    for (var s = 0; s <= steps; s++) {
      var yy = padT + plotH - (plotH * s / steps);
      ctx.beginPath(); ctx.moveTo(padL, yy); ctx.lineTo(W - padR, yy); ctx.stroke();
      ctx.fillStyle = '#aaa';
      ctx.font = '10px sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText(Math.round(maxVal * s / steps), padL - 4, yy + 4);
    }

    // バー
    values.forEach(function(v, i) {
      var x = padL + gap * i + (gap - barW) / 2;
      var bh = plotH * (v / maxVal);
      var y = padT + plotH - bh;

      // 影
      ctx.shadowColor = 'rgba(0,0,0,0.08)';
      ctx.shadowBlur = 4;
      ctx.shadowOffsetY = 2;

      // グラデーション
      var grad = ctx.createLinearGradient(x, y, x, padT + plotH);
      grad.addColorStop(0, COLORS[i]);
      grad.addColorStop(1, COLORS[i] + '99');
      ctx.fillStyle = grad;
      ctx.beginPath();
      roundRect(ctx, x, y, barW, bh, 5);
      ctx.fill();

      ctx.shadowColor = 'transparent';

      // 値ラベル
      if (v > 0) {
        ctx.fillStyle = '#333';
        ctx.font = 'bold 11px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(v, x + barW / 2, y - 5);
      }

      // ページラベル
      ctx.fillStyle = '#555';
      ctx.font = '10px sans-serif';
      ctx.textAlign = 'center';
      var label = PAGE_LABELS[pageKeys[i]];
      if (label.length > 5) {
        ctx.fillText(label.slice(0, 4), x + barW / 2, padT + plotH + 16);
        ctx.fillText(label.slice(4), x + barW / 2, padT + plotH + 28);
      } else {
        ctx.fillText(label, x + barW / 2, padT + plotH + 18);
      }
    });
  }

  // ---------- 折れ線グラフ ----------
  function renderLineChart(dailyCounts) {
    var canvas = document.getElementById('lineChart');
    canvas.width = canvas.offsetWidth || 800;
    var ctx = canvas.getContext('2d');
    var W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);

    // 直近7日のキーを生成
    var days = [];
    for (var d = 6; d >= 0; d--) {
      var dt = new Date();
      dt.setDate(dt.getDate() - d);
      days.push(formatDateKey(dt));
    }

    var padL = 36, padR = 12, padT = 16, padB = 36;
    var plotW = W - padL - padR;
    var plotH = H - padT - padB;

    // 全ページの日次データを集計して最大値を求める
    var maxVal = 1;
    pageKeys.forEach(function(k) {
      if (!dailyCounts[k]) return;
      days.forEach(function(day) {
        var v = dailyCounts[k][day] || 0;
        if (v > maxVal) maxVal = v;
      });
    });

    // 目盛り線
    ctx.strokeStyle = '#e8edf2';
    ctx.lineWidth = 1;
    var steps = 4;
    for (var s = 0; s <= steps; s++) {
      var yy = padT + plotH - (plotH * s / steps);
      ctx.beginPath(); ctx.moveTo(padL, yy); ctx.lineTo(W - padR, yy); ctx.stroke();
      ctx.fillStyle = '#aaa';
      ctx.font = '10px sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText(Math.round(maxVal * s / steps), padL - 4, yy + 4);
    }

    // 各ページの折れ線
    pageKeys.forEach(function(k, i) {
      var pageCounts = dailyCounts[k] || {};
      var pts = days.map(function(day, di) {
        var v = pageCounts[day] || 0;
        return {
          x: padL + plotW * di / (days.length - 1),
          y: padT + plotH - (plotH * v / maxVal),
          v: v
        };
      });

      // 塗りつぶし
      ctx.beginPath();
      ctx.moveTo(pts[0].x, padT + plotH);
      pts.forEach(function(p) { ctx.lineTo(p.x, p.y); });
      ctx.lineTo(pts[pts.length - 1].x, padT + plotH);
      ctx.closePath();
      ctx.fillStyle = COLORS_ALPHA[i];
      ctx.fill();

      // 線
      ctx.beginPath();
      ctx.strokeStyle = COLORS[i];
      ctx.lineWidth = 2;
      ctx.lineJoin = 'round';
      pts.forEach(function(p, pi) {
        pi === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
      });
      ctx.stroke();

      // ドット
      pts.forEach(function(p) {
        if (p.v === 0) return;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3.5, 0, Math.PI * 2);
        ctx.fillStyle = COLORS[i];
        ctx.fill();
      });
    });

    // X軸日付ラベル
    ctx.fillStyle = '#888';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    days.forEach(function(day, di) {
      var x = padL + plotW * di / (days.length - 1);
      var parts = day.split('-');
      ctx.fillText(parts[1] + '/' + parts[2], x, padT + plotH + 16);
    });

    // 凡例
    var legX = padL;
    var legY = padT + plotH + 30;
    ctx.font = '9px sans-serif';
    ctx.textAlign = 'left';
    pageKeys.forEach(function(k, i) {
      if (legX + 90 > W) return; // 幅超えたら省略
      ctx.fillStyle = COLORS[i];
      ctx.fillRect(legX, legY - 7, 12, 8);
      ctx.fillStyle = '#555';
      ctx.fillText(PAGE_LABELS[k], legX + 15, legY);
      legX += 80;
    });
  }

  // ---------- 日別テーブル ----------
  function renderTable(dailyCounts) {
    // 全ページのdayキーを収集してソート
    var daySet = {};
    pageKeys.forEach(function(k) {
      if (!dailyCounts[k]) return;
      Object.keys(dailyCounts[k]).forEach(function(day) { daySet[day] = true; });
    });
    var days = Object.keys(daySet).sort().reverse().slice(0, 30); // 直近30日

    // ヘッダー
    var thead = document.getElementById('tableHead');
    thead.innerHTML = '<th class="td-date">日付</th>'
      + pageKeys.map(function(k) { return '<th>' + PAGE_LABELS[k] + '</th>'; }).join('')
      + '<th>合計</th>';

    // ボディ
    var tbody = document.getElementById('tableBody');
    if (days.length === 0) {
      tbody.innerHTML = '<tr><td colspan="' + (pageKeys.length + 2) + '">データなし</td></tr>';
      return;
    }
    tbody.innerHTML = days.map(function(day) {
      var parts = day.split('-');
      var label = parts[1] + '月' + parts[2] + '日';
      var total = 0;
      var cells = pageKeys.map(function(k) {
        var v = (dailyCounts[k] && dailyCounts[k][day]) ? dailyCounts[k][day] : 0;
        total += v;
        return '<td>' + (v || '—') + '</td>';
      }).join('');
      return '<tr><td class="td-date">' + label + '</td>' + cells + '<td><strong>' + total + '</strong></td></tr>';
    }).join('');
  }

  // ---------- リセット ----------
  function openResetModal() { document.getElementById('overlay').classList.add('open'); }
  function closeResetModal(e) {
    if (e && e.target !== document.getElementById('overlay')) return;
    document.getElementById('overlay').classList.remove('open');
  }

  function doReset() {
    document.getElementById('overlay').classList.remove('open');
    setStatus('リセット中...');
    fetch(APP_URL + '?page=calendar&action=pageViewReset')
      .then(function(r) { return r.json(); })
      .then(function() { loadData(); })
      .catch(function(e) { setStatus('リセットエラー: ' + e.message); });
  }

  // ---------- ユーティリティ ----------
  function setStatus(msg) { document.getElementById('status').textContent = msg; }

  function formatDateKey(date) {
    var y = date.getFullYear();
    var m = ('0' + (date.getMonth() + 1)).slice(-2);
    var d = ('0' + date.getDate()).slice(-2);
    return y + '-' + m + '-' + d;
  }

  function formatDateTimeJP(iso) {
    try {
      var d = new Date(iso);
      if (isNaN(d)) return iso;
      return (d.getMonth() + 1) + '月' + d.getDate() + '日 '
        + ('0' + d.getHours()).slice(-2) + ':' + ('0' + d.getMinutes()).slice(-2);
    } catch (e) { return iso; }
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h);
    ctx.lineTo(x, y + h);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  // ---------- 初期化 ----------
  window.addEventListener('resize', function() {
    if (!currentData) return;
    renderBarChart(currentData.counts);
    renderLineChart(currentData.dailyCounts);
  });

  loadData();
</script>
</body>
</html>
