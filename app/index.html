<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="シフト">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>BizCAFE シフトリマインド</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <header class="header" id="header">
      <h1 class="header-title">シフトリマインド</h1>
      <button class="header-btn" id="btn-logout" hidden>ログアウト</button>
    </header>

    <main class="main" id="main-content">
      <!-- 各画面がここに動的に描画される -->
    </main>

    <nav class="bottom-nav" id="bottom-nav" hidden>
      <!-- ナビゲーションタブ -->
    </nav>
  </div>

  <!-- モーダル -->
  <div class="modal-overlay" id="modal-overlay" hidden>
    <div class="modal" id="modal-container"></div>
  </div>

  <!-- トースト通知 -->
  <div class="toast-container" id="toast-container"></div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/components/nav.js"></script>
  <script src="js/components/shiftCard.js"></script>
  <script src="js/components/modal.js"></script>
  <script src="js/views/login.js"></script>
  <script src="js/views/dashboard.js"></script>
  <script src="js/views/calendar.js"></script>
  <script src="js/views/upload.js"></script>
  <script src="js/views/staffManager.js"></script>
  <script src="js/views/reminder.js"></script>
  <script src="js/views/logs.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
