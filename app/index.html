<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="シフト">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>BiZCAFE シフトカレンダー</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <header class="header" id="header">
      <h1 class="header-title">☕ シフトカレンダー <span style="font-size:0.7rem; opacity:0.8; font-weight:normal; margin-left:8px;">v1.1.0</span></h1>
    </header>

    <main class="main" id="main-content"></main>
  </div>

  <!-- モーダル -->
  <div class="modal-overlay" id="modal-overlay" hidden>
    <div class="modal" id="modal-container"></div>
  </div>

  <!-- トースト通知 -->
  <div class="toast-container" id="toast-container"></div>

  <nav class="bottom-nav" id="bottom-nav">
    <button class="nav-item active" data-tab="calendar">
      <span class="nav-icon">📅</span>
      <span>カレンダー</span>
    </button>
    <button class="nav-item" data-tab="shift-change">
      <span class="nav-icon">🔄</span>
      <span>シフト交代</span>
    </button>
  </nav>

  <script src="js/api.js"></script>
  <script src="js/components/modal.js"></script>
  <script src="js/components/shiftCard.js"></script>
  <script src="js/views/calendar.js"></script>
  <script src="js/views/shiftChange.js"></script>
  <script src="js/views/meeting.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
