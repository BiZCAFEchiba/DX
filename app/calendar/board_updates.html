<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>更新一覧 - BizCAFE 千葉大学店</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background: #f5f7fa; color: #333; min-height: 100vh; display: flex; flex-direction: column;
    }
    header {
      background: linear-gradient(135deg, #1a3a5c, #2a5f8f); color: white; padding: 16px 20px;
      text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.2); flex-shrink: 0; position: relative;
    }
    header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: 0.05em; }
    .back-btn {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      color: white; text-decoration: none; font-size: 1.5rem; line-height: 1; padding: 4px 8px;
    }
    .container { max-width: 840px; margin: 0 auto; padding: 24px 16px 40px; width: 100%; }
    .page-title { font-size: 1.25rem; font-weight: 700; color: #1a3a5c; margin-bottom: 20px; border-bottom: 2px solid #1a3a5c; padding-bottom: 8px; }
    .update-list { display: flex; flex-direction: column; gap: 8px; }
    .update-item {
      display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; background: white;
      border-radius: 8px; border: 1px solid #dde6f0; text-decoration: none; color: inherit;
    }
    .update-meta { display: flex; flex-direction: column; gap: 4px; padding-top: 2px; }
    .update-label { background: #eaf0f7; color: #1a3a5c; font-size: 0.75rem; font-weight: 700; padding: 2px 6px; border-radius: 4px; white-space: nowrap; text-align: center; }
    .update-date { font-size: 0.8rem; color: #666; white-space: nowrap; }
    .update-title { font-size: 1rem; font-weight: 600; color: #333; line-height: 1.5; flex: 1; }
  </style>
</head>
<body>
<header>
  <a href="index.html#board" class="back-btn" aria-label="戻る">‹</a>
  <h1>BizCAFE 千葉大学店</h1>
</header>

<div class="container">
  <h2 class="page-title">更新一覧</h2>
  <div class="update-list" id="updateList"></div>
</div>

<script>
  var GAS_API_URL = '/api/gas';

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderList(items) {
    var updateList = document.getElementById('updateList');
    if (!items || items.length === 0) {
      updateList.innerHTML = '<div style="text-align:center;padding:24px;color:#999;">まだ更新はありません。</div>';
      return;
    }
    var html = '';
    items.forEach(function(item) {
      html += '<a href="articles/template.html?id=' + encodeURIComponent(item.id) + '" class="update-item">'
        + '<div class="update-meta"><span class="update-label">更新</span><span class="update-date">' + esc(item.displayDate || '') + '</span></div>'
        + '<div class="update-title">' + esc(item.title) + '</div>'
        + '</a>';
    });
    updateList.innerHTML = html;
  }

  fetch(GAS_API_URL + '?page=calendar&action=boardList&placement=updates')
    .then(function(r) { return r.json(); })
    .then(function(items) { renderList(Array.isArray(items) ? items : []); })
    .catch(function() { renderList([]); });
</script>
</body>
</html>
