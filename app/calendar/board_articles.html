<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>画像付き記事一覧 - BizCAFE 千葉大学店</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background: #f5f7fa; color: #333; min-height: 100vh; display: flex; flex-direction: column;
    }
    header {
      background: linear-gradient(135deg, #1a3a5c, #2a5f8f); color: white; padding: 16px 20px;
      text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.2); flex-shrink: 0; position: relative;
    }
    header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: 0.05em; }
    .back-btn {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      color: white; text-decoration: none; font-size: 1.5rem; line-height: 1; padding: 4px 8px;
    }
    .container { max-width: 840px; margin: 0 auto; padding: 24px 16px 40px; width: 100%; }
    .page-title { font-size: 1.25rem; font-weight: 700; color: #1a3a5c; margin-bottom: 20px; border-bottom: 2px solid #1a3a5c; padding-bottom: 8px; }
    .article-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
    .article-card { display: flex; flex-direction: column; background: white; border-radius: 12px; overflow: hidden; border: 1px solid #dde6f0; text-decoration: none; color: inherit; }
    .article-img-wrap { width: 100%; aspect-ratio: 16/9; background: #eaf0f7; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .article-img { width: 100%; height: 100%; object-fit: cover; }
    .article-img-placeholder { font-size: 2.5rem; color: #b0c4d8; }
    .article-body { padding: 12px 16px; display: flex; flex-direction: column; gap: 6px; flex: 1; }
    .article-title { font-size: 0.95rem; font-weight: 700; color: #333; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .article-meta { display: flex; align-items: center; gap: 8px; margin-top: auto; font-size: 0.75rem; }
    .article-date { color: #666; }
    .article-type { color: #1a3a5c; font-weight: 600; background: #eaf2fb; padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>
<header>
  <a href="index.html#board" class="back-btn" aria-label="戻る">‹</a>
  <h1>BizCAFE 千葉大学店</h1>
</header>

<div class="container">
  <h2 class="page-title">画像付き記事一覧</h2>
  <div class="article-grid" id="articleGrid"></div>
</div>

<script>
  var GAS_API_URL = 'https://script.google.com/macros/s/AKfycbxc5QSSH2bHqX6cuHqClVMWfkBrfqW8Zi4AY2E_wYPjO2NWUD4oJXMihgR1XtVgR0vP/exec';

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderList(items) {
    var articleGrid = document.getElementById('articleGrid');
    if (!items || items.length === 0) {
      articleGrid.innerHTML = '<div style="text-align:center;padding:24px;color:#999;grid-column:1 / -1;">まだ記事はありません。</div>';
      return;
    }
    var html = '';
    items.forEach(function(item) {
      var thumb = item.thumbnailUrl || item.imageUrl || '';
      var imgHtml = thumb
        ? '<img class="article-img" src="' + thumb + '" alt="記事画像">'
        : '<div class="article-img-placeholder">📄</div>';
      html += '<a href="articles/template.html?id=' + encodeURIComponent(item.id) + '" class="article-card">'
        + '<div class="article-img-wrap">' + imgHtml + '</div>'
        + '<div class="article-body">'
        + '<div class="article-title">' + esc(item.title) + '</div>'
        + '<div class="article-meta"><span class="article-type">' + esc(item.category || 'お知らせ') + '</span><span class="article-date">' + esc(item.displayDate || '') + '</span></div>'
        + '</div>'
        + '</a>';
    });
    articleGrid.innerHTML = html;
  }

  fetch(GAS_API_URL + '?page=calendar&action=boardList&placement=articles')
    .then(function(r) { return r.json(); })
    .then(function(items) { renderList(Array.isArray(items) ? items : []); })
    .catch(function() { renderList([]); });
</script>
</body>
</html>
