<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>記事詳細 - BizCAFE 千葉大学店</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background: #f5f7fa; color: #333; min-height: 100vh; display: flex; flex-direction: column;
    }
    header {
      background: linear-gradient(135deg, #1a3a5c, #2a5f8f); color: white; padding: 16px 20px;
      text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.2); flex-shrink: 0; position: relative;
    }
    header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: 0.05em; margin: 0; }
    .back-btn {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      color: white; text-decoration: none; font-size: 1.5rem; line-height: 1; padding: 4px 8px;
    }
    .article-container { max-width: 800px; margin: 0 auto; padding: 24px 16px 60px; width: 100%; }
    .article-header { margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #dde6f0; }
    .article-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; font-size: 0.85rem; }
    .article-date { color: #666; }
    .article-type { color: #1a3a5c; font-weight: 600; background: #eaf2fb; padding: 4px 8px; border-radius: 4px; }
    .article-title { font-size: 1.5rem; font-weight: 700; color: #1a3a5c; line-height: 1.4; margin-bottom: 20px; }
    .article-main-img {
      width: 100%; border-radius: 12px; overflow: hidden; margin-bottom: 32px; background: #eaf0f7;
      aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center;
    }
    .article-main-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .article-content { font-size: 1.05rem; line-height: 1.8; color: #333; white-space: pre-wrap; }
    .article-empty { text-align: center; color: #999; padding: 40px 20px; }
    .bottom-back { display: block; text-align: center; margin-top: 48px; }
    .bottom-back a {
      display: inline-block; padding: 12px 32px; background: white; color: #1a3a5c; text-decoration: none;
      font-weight: 600; border-radius: 8px; border: 2px solid #1a3a5c;
    }
  </style>
</head>
<body>
<header>
  <a href="../index.html#board" class="back-btn" aria-label="戻る">‹</a>
  <h1>BizCAFE 千葉大学店</h1>
</header>

<div class="article-container">
  <div class="article-header">
    <div class="article-meta">
      <span class="article-type" id="articleType">読み込み中</span>
      <span class="article-date" id="articleDate"></span>
    </div>
    <h1 class="article-title" id="articleTitle">読み込み中...</h1>
  </div>
  <div class="article-main-img" id="articleImageWrap">
    <img src="" alt="メイン画像" id="articleImage" style="display:none;">
    <div id="articleImagePlaceholder">画像はありません</div>
  </div>
  <div class="article-content" id="articleContent"></div>
  <div class="bottom-back">
    <a href="../index.html#board">一覧に戻る</a>
  </div>
</div>

<script>
  var GAS_API_URL = 'https://script.google.com/macros/s/AKfycbxc5QSSH2bHqX6cuHqClVMWfkBrfqW8Zi4AY2E_wYPjO2NWUD4oJXMihgR1XtVgR0vP/exec';

  function getArticleId() {
    return new URLSearchParams(window.location.search).get('id') || '';
  }

  function renderArticle(item) {
    if (!item || item.ok === false) {
      document.getElementById('articleTitle').textContent = '記事が見つかりません';
      document.getElementById('articleType').textContent = '未取得';
      document.getElementById('articleDate').textContent = '';
      document.getElementById('articleContent').innerHTML = '<div class="article-empty">指定された記事は存在しないか、非公開です。</div>';
      document.getElementById('articleImageWrap').style.display = 'none';
      return;
    }
    document.title = item.title + ' - BizCAFE 千葉大学店';
    document.getElementById('articleTitle').textContent = item.title || '';
    document.getElementById('articleType').textContent = item.category || 'お知らせ';
    document.getElementById('articleDate').textContent = item.displayDate || '';
    document.getElementById('articleContent').textContent = item.body || '';

    var imageUrl = item.imageUrl || item.thumbnailUrl || '';
    var image = document.getElementById('articleImage');
    var placeholder = document.getElementById('articleImagePlaceholder');
    if (imageUrl) {
      image.src = imageUrl;
      image.style.display = 'block';
      placeholder.style.display = 'none';
    } else {
      image.style.display = 'none';
      placeholder.style.display = 'block';
    }
  }

  var articleId = getArticleId();
  if (!articleId) {
    renderArticle({ ok: false });
  } else {
    fetch(GAS_API_URL + '?page=calendar&action=boardDetail&id=' + encodeURIComponent(articleId))
      .then(function(r) { return r.json(); })
      .then(function(item) { renderArticle(item); })
      .catch(function() { renderArticle({ ok: false }); });
  }
</script>
</body>
</html>
